<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinical Timeline</title>

  <!--
    Plotly.js is the charting library that draws the interactive timeline.
    We load it from a CDN so there is nothing to install locally.
    Docs: https://plotly.com/javascript/
  -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <style>
    /* ================================================================
       CSS CONCEPTS USED IN THIS FILE
       ================================================================
       This stylesheet demonstrates several core CSS concepts:

       1. CSS CUSTOM PROPERTIES (CSS Variables):
          Defined with --name: value syntax. Use them anywhere with var(--name).
          Benefit: Change colors, sizes, spacing everywhere by editing one place.
          Example: :root { --bg: #0f1117; } ... body { background: var(--bg); }

       2. BOX MODEL:
          Every element has: content → padding → border → margin (outside).
          box-sizing: border-box means "padding and border count toward width/height"
          instead of being added on top.

       3. FLEXBOX (display: flex):
          A layout system for arranging items in rows/columns.
          flex: 1 means "grow to fill available space equally".
          justify-content: centers items horizontally.
          align-items: centers items vertically.
          gap: space between items.

       4. CSS TRANSITIONS:
          Smooth animation between property values (e.g., color, width, opacity).
          transition: property duration; makes changes animate instead of snap.
          Example: transition: width 0.2s; makes width changes take 0.2 seconds.

       5. CALC() FUNCTION:
          Math with mixed CSS units. Example: calc(100vh - 110px) = full viewport
          height minus 110 pixels. Lets the browser do the arithmetic.
    ================================================================ */

    /* ================================================================
       CSS CUSTOM PROPERTIES (ROOT VARIABLES)
       ================================================================
       :root is the document root (essentially the <html> element).
       Variables defined here are available everywhere in the stylesheet.
       To use: var(--bg) pulls the value #0f1117 wherever you write it.
       To retheme: change the hex codes below and the whole app updates.
    ================================================================ */
    :root {
      --bg:       #0f1117;   /* page background */
      --surface:  #1a1d27;   /* card / panel background */
      --border:   #2a2d3a;   /* subtle dividing lines */
      --text:     #e1e4ed;   /* primary text */
      --text-muted: #8b8fa3; /* secondary / label text */
      --accent:   #6c7bff;   /* interactive highlights */
      --panel-w:  260px;     /* width of the problem list side panel */
    }

    /* Hard reset — removes browser default margin/padding and ensures
       every element sizes with padding included (box-sizing: border-box). */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }


    /* ================================================================
       HEADER
       ================================================================
       Styles the top bar showing "Clinical Timeline".
       Uses flexbox with space-between to position content at opposite ends.
       Note: display: flex makes children lay out horizontally by default.
    ================================================================ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }


    /* ================================================================
       FILTER BAR
       ================================================================
       Row of toggle buttons above the timeline.
       Each button has a data-cat attribute that JS reads to know which
       category to toggle when clicked.

       CSS TRICK: flex-wrap: wrap lets buttons move to a new line if needed.
    ================================================================ */
    .filters {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center;
    }
    .filters span.lbl { color: var(--text-muted); font-size: 0.8rem; margin-right: 4px; }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      /* CSS TRANSITION: smooth animation when hover or active state changes */
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-btn:hover { border-color: var(--accent); }

    /* CSS STATE CLASS: .active is added/removed by JavaScript when the button
       is toggled on or off. This is how we change appearance based on UI state. */
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Small coloured dot inside the filter button */
    .filter-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }


    /* ================================================================
       MAIN LAYOUT
       ================================================================
       Flexbox row: problem list panel (fixed width) on the left,
       timeline chart (fills remaining space) on the right.
       Height: calc(100vh - 110px) uses the CALC() function to compute
       "full viewport height minus header and filter bar (110px total)".
       This makes the layout fit perfectly without scrollbars.

       CSS CONCEPT - Viewport Units:
       - vh = viewport height (100vh = full screen height)
       - vw = viewport width (100vw = full screen width)
    ================================================================ */
    .main-layout {
      display: flex;
      height: calc(100vh - 110px);
      overflow: hidden;
    }


    /* ================================================================
       PROBLEM LIST SIDE PANEL
       ================================================================
       Left-side collapsible panel. When expanded, it's 260px wide.
       When collapsed (CSS class .collapsed added), it narrows to 36px.
       The width transition (0.2s) makes the collapse/expand animation smooth.

       CSS TRICK - Flexbox flex-direction: column stacks child elements vertically.
       flex: 1 on #problem-list makes it grow to fill remaining vertical space.

       CSS STATE PATTERN: The .collapsed class toggles appearance:
       - Regular: full width, all content visible
       - Collapsed: narrow rail, content hidden, arrow rotated
    ================================================================ */
    #problem-panel {
      width: var(--panel-w);
      min-width: var(--panel-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      /* Smooth animation when width changes */
      transition: width 0.2s ease, min-width 0.2s ease;
      overflow: hidden;
    }
    /* Collapsed state — narrow rail showing only the toggle button */
    #problem-panel.collapsed {
      width: 36px;
      min-width: 36px;
    }

    /* Panel header row: "Problem List" title + collapse/expand button */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
    }
    /* When collapsed, centre the toggle button in the narrow rail */
    #problem-panel.collapsed .panel-header {
      justify-content: center;
      padding: 12px 0;
    }

    .panel-header h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      opacity: 1;
      transition: opacity 0.15s;
    }
    /* Hide the title text when the panel is collapsed */
    #problem-panel.collapsed .panel-header h2 { opacity: 0; width: 0; overflow: hidden; }

    /* The < / > toggle button */
    #toggle-panel {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 2px 6px;
      flex-shrink: 0;
      transition: transform 0.2s, color 0.15s;
      line-height: 1;
    }
    #toggle-panel:hover { color: var(--text); }
    /* Rotate the arrow when the panel is collapsed so it points right (expand) */
    #problem-panel.collapsed #toggle-panel { transform: rotate(180deg); }

    /* Scrollable area that holds the problem cards */
    #problem-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
      opacity: 1;
      transition: opacity 0.15s;
    }
    /* Hide the list content while the panel is collapsed */
    #problem-panel.collapsed #problem-list { opacity: 0; pointer-events: none; }


    /* ── Individual problem card ──────────────────────────────── */
    .problem-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: default;
    }
    .problem-item:last-child { border-bottom: none; }

    .problem-name {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 4px;
      /* Truncate long names with an ellipsis; full name shown in tooltip (title attr) */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Row of small metadata badges below the problem name */
    .problem-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .problem-date { font-size: 0.72rem; color: var(--text-muted); }
    .problem-icd  { font-size: 0.72rem; color: var(--text-muted); font-family: monospace; }

    /* Active / Resolved badge */
    .status-badge {
      font-size: 0.65rem;
      padding: 1px 7px;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }
    .status-badge.active   { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .status-badge.resolved { background: rgba(139,143,163,0.2); color: var(--text-muted); }

    /* "Details" expand/collapse button and its content box */
    .problem-links-toggle {
      margin-top: 6px;
      font-size: 0.72rem;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-align: left;
    }
    .problem-links-toggle:hover { text-decoration: underline; }

    .problem-links {
      display: none;      /* hidden by default */
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .problem-links.open { display: block; }  /* JS adds .open to expand */

    /* Row inside the expanded details: coloured dot + label + date */
    .linked-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .linked-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }


    /* ================================================================
       TIMELINE CHART AREA
       ================================================================
       Takes up all remaining horizontal space to the right of the panel.
       flex: 1 makes it grow to fill available width.
       overflow: hidden prevents scrollbars.
       position: relative establishes a positioning context for the popup.
    ================================================================ */
    #timeline-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #timeline-chart {
      width: 100%;
      height: 100%;
      padding: 8px;
    }


    /* ================================================================
       EVENT DETAIL POPUP
       ================================================================
       Fixed-position card in the top-right corner when a timeline marker
       is clicked. Hidden by default (display: none).

       CSS POSITIONING CONCEPT - position: fixed:
       Elements with position: fixed stay in place even when scrolling.
       They're positioned relative to the viewport, not the document.

       z-index: 100 ensures the popup sits above the chart.
       max-height + overflow-y: auto makes it scrollable if content is tall.
    ================================================================ */
    #detail-panel {
      display: none;
      position: fixed;
      right: 24px;
      top: 120px;
      width: 300px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      z-index: 100;   /* sits above the chart */
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-height: calc(100vh - 150px);
      overflow-y: auto;
    }
    #detail-panel h3 { margin-bottom: 8px; font-size: 1rem; }

    /* Coloured category label at the top of the popup */
    #detail-panel .cat-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      color: #fff;
    }
    #detail-panel .date { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 10px; }
    #detail-panel .desc { font-size: 0.9rem; line-height: 1.5; margin-bottom: 12px; }

    /* Extra metadata table (provider, location, ICD-10, result, etc.) */
    #detail-panel .details-table { width: 100%; font-size: 0.8rem; }
    #detail-panel .details-table td { padding: 3px 0; }
    #detail-panel .details-table td:first-child { color: var(--text-muted); padding-right: 12px; }

    /* Section header inside the popup (e.g. "Diagnoses", "Labs") */
    .detail-section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin: 14px 0 6px;
    }

    /* Row for a linked item inside the popup */
    .detail-linked-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 0.82rem;
      border-bottom: 1px solid var(--border);
    }
    .detail-linked-item:last-child { border-bottom: none; }
    .detail-linked-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* X close button in the top-right corner of the popup */
    #detail-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: var(--text-muted);
      font-size: 1.1rem; cursor: pointer;
    }


    /* ================================================================
       PLANNED EVENT STYLES
       ================================================================
       Planned / AAP-guideline future events have a distinct visual design:
       - Dashed border instead of solid (suggests "not yet happened")
       - Lighter, cooler colors (pastel blue #74b9ff)
       - Semi-transparent background (opacity) for "future" feel
       - These design choices help users distinguish planned from completed.
    ================================================================ */

    /* "PLANNED" badge in the detail popup */
    .planned-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 6px;
      background: rgba(116, 185, 255, 0.25);
      color: #74b9ff;
      border: 1px solid rgba(116, 185, 255, 0.4);
      font-weight: 600;
    }

    /* AAP guideline reference line */
    .guideline-ref {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-style: italic;
      margin: 8px 0 12px;
      padding: 6px 10px;
      border-left: 3px solid #74b9ff;
      background: rgba(116, 185, 255, 0.06);
      border-radius: 0 6px 6px 0;
    }

    /* Sample Order button */
    .sample-order-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #6c7bff, #5b6de8);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .sample-order-btn:hover {
      background: linear-gradient(135deg, #7d8cff, #6c7bff);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(108, 123, 255, 0.35);
    }

    /* Expanded order details panel below the button */
    .order-details {
      display: none;
      margin-top: 10px;
      padding: 12px;
      background: rgba(108, 123, 255, 0.08);
      border: 1px solid rgba(108, 123, 255, 0.2);
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.6;
    }
    .order-details.open { display: block; }

    .order-details .order-field {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid rgba(108, 123, 255, 0.1);
    }
    .order-details .order-field:last-child { border-bottom: none; }
    .order-details .order-field-label { color: var(--text-muted); }
    .order-details .order-field-value { color: var(--text); font-weight: 500; }

    .order-details h4 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6c7bff;
      margin-bottom: 8px;
    }

    /* ================================================================
       LEGEND TOGGLE — button in the filter bar to show/hide Plotly legend
    ================================================================ */
    #legend-toggle {
      padding: 5px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #legend-toggle:hover { border-color: var(--accent); color: var(--text); }
    #legend-toggle.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    #legend-toggle .arrow {
      font-size: 0.65rem;
      transition: transform 0.2s;
    }
    #legend-toggle.active .arrow { transform: rotate(180deg); }

    /* "Planned" filter button special styling — dashed border to match theme */
    .filter-btn[data-cat="planned"] {
      border-style: dashed;
    }
    .filter-btn[data-cat="planned"].active {
      background: rgba(116, 185, 255, 0.3);
      border-color: #74b9ff;
      border-style: dashed;
      color: #74b9ff;
    }
  </style>
</head>
<body>

<header>
  <div><h1>Clinical Timeline</h1></div>
</header>

<!--
  ====================================================================
  FILTER BAR — HTML SECTION
  ====================================================================
  Buttons for toggling event categories on/off.

  The "data-cat" CUSTOM HTML ATTRIBUTE on each button stores the category
  name ("encounter", "diagnosis", "lab", etc.). JavaScript reads these
  values via element.dataset.cat to know which category to toggle.

  Layout:
  - "All" button: click to turn all categories on (or all off if all on)
  - Individual category buttons: toggle that category
  - Separator line: visual break between categories and planned
  - "Planned" button: separate toggle for future/AAP-guideline events

  Encounters is active by default (primary view).
  Diagnoses, Labs, and Therapeutics are off by default.
  Therapeutics has two visual variants driven by subtype:
    counseling — orange diamond
    medication  — purple hexagon
====================================================================
-->
<div class="filters">
  <span class="lbl">Show:</span>
  <button class="filter-btn" data-cat="all">All</button>
  <button class="filter-btn active" data-cat="encounter">
    <span class="filter-dot" style="background:#3498db"></span> Encounters
  </button>
  <button class="filter-btn" data-cat="diagnosis">
    <span class="filter-dot" style="background:#e74c3c"></span> Diagnoses
  </button>
  <button class="filter-btn" data-cat="lab">
    <span class="filter-dot" style="background:#2ecc71"></span> Labs
  </button>
  <!--
    Therapeutics button uses a split dot to hint at the two subtypes.
    The JS splits therapeutic events into two Plotly traces by subtype
    so counseling (orange) and medication (purple) look different on the chart.
  -->
  <button class="filter-btn" data-cat="counseling">
    <span class="filter-dot" style="background:#e67e22"></span> Counseling
  </button>
  <button class="filter-btn" data-cat="medication">
    <span class="filter-dot" style="background:#9b59b6"></span> Medications
  </button>
  <!--
    Visual separator: a thin vertical line between regular categories and planned.
    This emphasizes that "Planned" is conceptually separate from historical events.
  -->
  <span style="width:1px;height:20px;background:var(--border);margin:0 6px"></span>
  <button class="filter-btn active" data-cat="planned">
    <span class="filter-dot" style="background:#74b9ff; border:1px dashed #fff"></span>
    Planned (AAP)
  </button>
  <span style="width:1px;height:20px;background:var(--border);margin:0 6px"></span>
  <button id="legend-toggle" class="active" title="Show/hide chart legend">
    Legend <span class="arrow">&#9660;</span>
  </button>
</div>

<!-- MAIN LAYOUT: side panel on left, chart on right -->
<div class="main-layout">

  <!--
    ====================================================================
    PROBLEM LIST SIDE PANEL — HTML SECTION
    ====================================================================
    The collapsible left-side panel. When expanded, it shows a searchable
    list of all problems in the patient's problem list. Each problem card
    shows: name, status (active/resolved), onset date, ICD-10 code, and
    an expandable "Details" section showing linked labs.

    When collapsed (toggled by the < button), it becomes a narrow rail.
    The renderProblemList() JavaScript function injects all the problem
    cards into the #problem-list div.

    Panel header:
    - h2 "Problem List" title
    - toggle button (< / >) to collapse/expand
  -->
  <div id="problem-panel">
    <div class="panel-header">
      <h2>Problem List</h2>
      <!-- &#8249; is the < character — safe HTML entity, no encoding issues -->
      <button id="toggle-panel" title="Collapse">&#8249;</button>
    </div>
    <!-- Problem cards are injected here by renderProblemList() in JS -->
    <div id="problem-list"></div>
  </div>

  <!--
    ====================================================================
    TIMELINE CHART AREA — HTML SECTION
    ====================================================================
    Container for the Plotly timeline chart. The chart itself is rendered
    into #timeline-chart by JavaScript's Plotly.react() function.

    #timeline-wrap is positioned relative and is the parent container.
    #timeline-chart is where Plotly draws all its SVG and DOM elements.
  -->
  <div id="timeline-wrap">
    <div id="timeline-chart"></div>
  </div>

</div>

<!--
  ====================================================================
  EVENT DETAIL POPUP — HTML SECTION
  ====================================================================
  A fixed-position card that pops up when the user clicks on a marker
  in the timeline. Starts hidden (display: none in CSS).

  #detail-close: the X button in the top-right
  #detail-content: the placeholder where event details get injected

  The showDetail() JavaScript function populates #detail-content with
  formatted event information (name, date, linked diagnoses, etc.).
====================================================================
-->
<div id="detail-panel">
  <button id="detail-close">&times;</button>
  <div id="detail-content"></div>
</div>


<script>
// =============================================================================
// JAVASCRIPT CONCEPTS USED IN THIS FILE
// =============================================================================
//
// const / let:
//   const = cannot be reassigned after creation; preferred for immutability
//   let = can be reassigned; used when value will change
//
// Template literals (backticks):
//   `Hello ${name}` instead of "Hello " + name
//   More readable, supports multiline strings, and expressions inside ${}
//
// Arrow functions:
//   (x) => x * 2  is shorthand for function(x) { return x * 2; }
//   Used throughout for callbacks like .forEach(), .map(), .filter()
//
// Array methods (higher-order functions):
//   .map(fn)      — transform each element, returns new array
//   .filter(fn)   — keep only elements that pass a test
//   .forEach(fn)  — loop over each element (side effects only)
//   .join(sep)    — combine array into a string with separator
//
// Set:
//   A collection of unique values. Methods: .has(), .add(), .delete(), .clear()
//   Used to track active categories efficiently.
//
// DOM Manipulation:
//   document.getElementById() — find element by id
//   element.innerHTML = "..." — inject HTML
//   element.classList.add/remove/toggle() — change CSS classes
//   element.addEventListener() — attach event listeners
//
// Event listeners:
//   "click", "plotly_click", etc. — events that trigger callbacks
//
// =============================================================================

// =============================================================================
// DATA — TEMPLATE VARIABLES FROM PYTHON
// =============================================================================
// The Python backend (app.py) injects these as JavaScript variables when
// serving the page. {{ events_json }} is a template placeholder that gets
// replaced with actual JSON before the browser sees this code.
//
// By the time JavaScript runs, these are plain JS arrays of objects.
//
// ALL_EVENTS example object:
//   {
//     category: "encounter",
//     label: "Cardiology Consult",
//     event_date: "2024-04-02",
//     description: "...",
//     color: "#3498db",
//     symbol: "square",
//     planned: false,
//     details: { provider: "Dr. Martinez", linked_encounter: null }
//   }
//
// ALL_PROBLEMS example object:
//   {
//     name: "Complete AVSD",
//     onset_date: "2024-04-02",
//     status: "resolved",
//     icd10: "Q21.2",
//     description: "..."
//   }
// =============================================================================
const ALL_EVENTS   = {{ events_json }};
const ALL_PROBLEMS = {{ problems_json }};


// =============================================================================
// LOOKUP HELPERS
// =============================================================================
// These functions filter ALL_EVENTS to find related events.
// They are used when building the popup content and problem list details.

/**
 * linkedToEncounter(encounterLabel)
 *
 * CONCEPT: .filter() creates a NEW array containing only elements that pass
 * a test function. The arrow function (ev => ...) returns true if the element
 * should be included.
 *
 * Returns all events (diagnoses and labs) whose details.linked_encounter
 * matches the given encounter label.
 * Used to populate the encounter popup with "what happened at this visit".
 */
function linkedToEncounter(encounterLabel) {
  return ALL_EVENTS.filter(ev =>
    ev.details && ev.details.linked_encounter === encounterLabel
  );
}

/**
 * linkedToDiagnosis(diagnosisLabel)
 *
 * Returns all events whose details.linked_diagnosis matches the given label.
 * Used by the problem list to show labs associated with each diagnosis.
 */
function linkedToDiagnosis(diagnosisLabel) {
  return ALL_EVENTS.filter(ev =>
    ev.details && ev.details.linked_diagnosis === diagnosisLabel
  );
}


// =============================================================================
// PROBLEM LIST PANEL
// =============================================================================
// Builds and injects HTML for every problem in ALL_PROBLEMS.
// Each card shows: name, status badge, onset date, ICD-10, and an optional
// expandable "Details" section with linked labs.
//
// KEY PATTERN: HTML assembly using .map() and template literals
//   1. Map over ALL_PROBLEMS, generating an HTML string for each
//   2. Join all strings together with .join("")
//   3. Inject the final HTML into the DOM with element.innerHTML
//
// EVENT LISTENER ATTACHMENT PATTERN:
//   Attach listeners AFTER injecting HTML, because the elements don't exist
//   until then. Use querySelectorAll + forEach to attach to all matching elements.
//
function renderProblemList() {
  const container = document.getElementById("problem-list");

  // ARRAY METHOD EXPLANATION: .map() transforms each element in an array
  // and returns a new array of transformed elements. Here we transform
  // each problem object into an HTML string.
  container.innerHTML = ALL_PROBLEMS.map((p, i) => {

    // Format onset date as "Mar 2024"
    const onsetDate = new Date(p.onset_date).toLocaleDateString("en-US", {
      year: "numeric", month: "short"
    });

    // Find labs that reference this diagnosis
    const linkedLabs = linkedToDiagnosis(p.name).filter(e => e.category === "lab");

    // Build the inner list of lab rows (shown when Details is expanded)
    // TEMPLATE LITERAL: backtick-quoted string allows ${expression} substitution
    // and spans multiple lines naturally.
    const linkedItemsHtml = linkedLabs.map(ev => {
      const evDate = new Date(ev.event_date).toLocaleDateString("en-US", {
        month: "short", year: "numeric"
      });
      return `<div class="linked-item">
        <span class="linked-dot" style="background:#2ecc71"></span>
        <span>${ev.label}</span>
        <span style="margin-left:auto;opacity:0.5">${evDate}</span>
      </div>`;
    }).join("");  // .join("") combines array of strings into one string

    // Only render the Details toggle if there is something to show
    const hasLinked = linkedLabs.length > 0;

    return `
      <div class="problem-item">

        <!-- Full name in title attribute so it shows on hover if truncated -->
        <div class="problem-name" title="${p.name}">${p.name}</div>

        <!-- Metadata row: status badge, onset date, ICD-10 code -->
        <div class="problem-meta">
          <span class="status-badge ${p.status}">${p.status}</span>
          <span class="problem-date">${onsetDate}</span>
          ${p.icd10 ? `<span class="problem-icd">${p.icd10}</span>` : ""}
        </div>

        <!--
          Details toggle — only rendered when linked labs exist.
          data-idx: CUSTOM HTML ATTRIBUTE storing the problem index,
            used by JS to find the matching collapsible box
          data-open: CUSTOM HTML ATTRIBUTE tracking open/closed state
            (reading button text is fragile; this state is explicit)
        -->
        ${hasLinked ? `
        <button class="problem-links-toggle" data-idx="${i}" data-open="false">
          + Details
        </button>
        <div class="problem-links" id="plinks-${i}">
          ${linkedItemsHtml}
        </div>` : ""}

      </div>`;
  }).join("");  // .join("") combines all problem HTML strings

  // EVENT LISTENER ATTACHMENT PATTERN:
  // Attach click listeners to every Details toggle button.
  // We do this AFTER injecting HTML because the buttons don't exist until then.
  container.querySelectorAll(".problem-links-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx    = btn.dataset.idx;      // read custom data attribute
      const box    = document.getElementById(`plinks-${idx}`);
      const isOpen = btn.dataset.open === "true";

      if (isOpen) {
        box.classList.remove("open");      // CSS class toggles display
        btn.dataset.open = "false";        // update state attribute
        btn.textContent  = "+ Details";
      } else {
        box.classList.add("open");
        btn.dataset.open = "true";
        btn.textContent  = "- Details";
      }
    });
  });
}


// =============================================================================
// SIDE PANEL COLLAPSE / EXPAND
// =============================================================================
// Clicking the < button toggles the "collapsed" CSS class on #problem-panel.
// The CSS transition property animates the width change smoothly over 0.2s.
// After the transition, we tell Plotly to resize so the chart fills the new
// available width. (Plotly doesn't automatically notice size changes.)
//
// CLOSURE PATTERN: The arrow function () => { ... } is called later when
// the button is clicked. It "closes over" the surrounding scope.
document.getElementById("toggle-panel").addEventListener("click", () => {
  document.getElementById("problem-panel").classList.toggle("collapsed");
  // Re-render the Plotly chart after transition completes (0.2s = 200ms)
  setTimeout(() => Plotly.Plots.resize(document.getElementById("timeline-chart")), 220);
});


// =============================================================================
// TIMELINE — CONFIGURATION
// =============================================================================
// CATEGORY_ROWS maps each category to a fixed y-axis row number on the chart.
// Plotly's y-axis goes bottom-to-top, so row 1 is lowest on screen.
//
//   Row 4 — Therapeutics (top)     — counseling + medication subtypes
//   Row 3 — Diagnoses
//   Row 2 — Labs
//   Row 1 — Encounters  (bottom)   — PRIMARY ROW, always visible by default
//
// Why numbers instead of category names? Plotly expects numeric y-coordinates.
// We map categories to numbers so they always plot at the same row.
// Later, in the layout configuration, we map the numbers back to labels
// for display.
//
// activeCategories is a SET that tracks which rows are currently toggled on.
// Only "encounter" is on by default.
//
// SET DATA STRUCTURE: Like an array, but guarantees uniqueness and has special
// methods: .has(value), .add(value), .delete(value), .clear(), .size (count).
// We use it to efficiently check if a category is active and track state.
// CATEGORY_ROWS maps each category to a y-axis row number.
// Counseling and Medications now have their own dedicated rows so markers
// don't overlap. The row numbers go bottom-to-top on the chart.
const CATEGORY_ROWS = {
  encounter:   1,   // primary / default row (bottom)
  lab:         2,
  diagnosis:   3,
  counseling:  4,   // therapeutic subtype — own row
  medication:  5,   // therapeutic subtype — own row (top)
};

// Helper: given a raw event, return its row number.
// For therapeutic events we look at the subtype to pick the correct row;
// for all other categories, we look up by category directly.
function rowForEvent(ev) {
  if (ev.category === "therapeutic") {
    const sub = ev.details && ev.details.subtype;
    if (sub === "medication")  return CATEGORY_ROWS.medication;
    return CATEGORY_ROWS.counseling;   // default therapeutic subtype
  }
  return CATEGORY_ROWS[ev.category];
}

// Start with Encounters visible + planned events visible
let activeCategories = new Set(["encounter"]);
let showPlanned = true;   // whether planned/future events are displayed
let showLegend  = true;   // whether the Plotly legend is visible


// =============================================================================
// buildTraces(events)
// =============================================================================
// Converts raw event objects into Plotly "trace" objects.
//
// BIG PICTURE:
// A "trace" in Plotly is a series of data points that get drawn together
// as one visual group (line, scatter plot, etc.). Each trace can have its
// own color, symbol, legend entry, etc.
//
// We build a traces object keyed by category (or "category:subtype" for
// therapeutics). Each trace is a collection of parallel arrays:
//   x[]          — dates (Plotly treats x-axis as time)
//   y[]          — row number (from CATEGORY_ROWS)
//   text[]       — label shown in hover tooltip
//   customdata[] — the full event object, retrieved on click
//
// TRACE KEY SYSTEM:
// Regular events: key = category (e.g., "encounter", "diagnosis")
// Therapeutic with subtypes: key = "category:subtype" (e.g., "therapeutic:counseling")
// Planned events: additional suffix ":planned" (e.g., "encounter:planned")
// This allows, for example, planned counseling and actual counseling to appear
// as separate legend entries with different colors and marker styles.
//
// Filter logic:
//   - Skip if category not in activeCategories
//   - Skip if planned and showPlanned is false
//
function buildTraces(events) {
  const traces = {};  // keyed by category (or "category:subtype" for therapeutics)

  events.forEach(ev => {

    // Determine the filter key for this event.
    // Therapeutic events are filtered by their subtype ("counseling" or "medication"),
    // not by the generic "therapeutic" category, since they have separate buttons now.
    const cat       = ev.category;
    const subtype   = (cat === "therapeutic") ? (ev.details.subtype || "counseling") : null;
    const filterKey = subtype || cat;   // "counseling", "medication", "encounter", etc.

    // Skip if this category/subtype is currently filtered off
    if (!activeCategories.has(filterKey)) return;

    // Skip planned events if the planned filter is off
    if (ev.planned && !showPlanned) return;

    const isPlanned = !!ev.planned;  // !! converts to boolean

    // Build a unique trace key. Planned events get a suffix so they form
    // their own traces with distinct visual styling.
    const planTag   = isPlanned ? ":planned" : "";
    const traceKey  = subtype ? `${cat}:${subtype}${planTag}` : `${cat}${planTag}`;

    // Initialise the trace the first time we see this key
    if (!traces[traceKey]) {
      // Capitalise subtype for the legend: "counseling" -> "Counseling"
      let legendName = subtype
        ? subtype.charAt(0).toUpperCase() + subtype.slice(1)
        : cat.charAt(0).toUpperCase() + cat.slice(1);
      if (isPlanned) legendName += " (Planned)";

      // PLOTLY TRACE STRUCTURE:
      traces[traceKey] = {
        // Parallel arrays that define the trace data:
        x: [],              // x-axis values (dates for timeline)
        y: [],              // y-axis values (row numbers)
        text: [],           // hover text (what the user sees on mouseover)
        customdata: [],     // arbitrary extra data (we store the full event object)

        mode: "markers",    // render as scatter points (dots), not lines
        type: "scatter",    // Plotly chart type

        name: legendName,   // legend label
        marker: {
          color:   ev.color,    // resolved by models.py — accounts for subtype + planned
          symbol:  ev.symbol,   // circle, square, diamond, etc.
          size:    isPlanned ? 12 : 14,
          line:    { width: isPlanned ? 2.5 : 1.5, color: isPlanned ? ev.color : "#fff" },
          opacity: isPlanned ? 0.9 : 1,
        },
        // HOVERTEMPLATE: Plotly syntax for formatting hover text.
        // %{text} inserts the value from the text[] array
        // %{x|%b %d, %Y} formats the date as "Mar 15, 2024"
        // <extra></extra> hides the trace name (we put it in text instead)
        hovertemplate: isPlanned
          ? "<b>%{text}</b><br>%{x|%b %d, %Y}<br><i>Planned — AAP Guideline</i><extra></extra>"
          : "<b>%{text}</b><br>%{x|%b %d, %Y}<br><extra></extra>",
      };
    }

    // Push this event into the trace arrays
    traces[traceKey].x.push(ev.event_date);
    traces[traceKey].y.push(rowForEvent(ev));   // uses subtype-aware row lookup
    traces[traceKey].text.push(ev.label);
    traces[traceKey].customdata.push(ev);  // store full object for click handler
  });

  // Convert traces object into an array of trace objects (Plotly expects an array)
  return Object.values(traces);
}


// =============================================================================
// renderTimeline()
// =============================================================================
// Calls buildTraces() then hands the result to Plotly.react().
//
// PLOTLY.REACT() vs PLOTLY.NEWPLOT():
//   newPlot() creates a fresh chart every time (slower, clears state)
//   react() intelligently updates only what changed (faster, preserves state)
//   On first call, react() creates the chart. On subsequent calls, it updates.
//   This makes filter toggles instant and smooth.
//
// LAYOUT OBJECT: Configures axes, labels, margins, colors, legend, etc.
//   - xaxis: type: "date", gridcolor, tickformat, dtick (tick spacing)
//   - yaxis: custom labels, ranges, styling
//   - shapes[]: draw additional shapes (we use this for the "Today" line)
//   - annotations[]: add text labels (we use this for the "Today" label)
//
// CONFIG OBJECT: Controls interactive features
//   - responsive: true means chart resizes when window resizes
//   - scrollZoom: true enables zooming by scrolling
//   - displayModeBar: show/hide the toolbar
//   - modeBarButtonsToRemove: hide specific toolbar buttons
//
// EVENT LISTENER REATTACHMENT:
//   Plotly.react() resets all event listeners. We must re-attach the click
//   handler after every render. removeAllListeners() prevents duplicates.
//
function renderTimeline() {
  const traces = buildTraces(ALL_EVENTS);

  const layout = {
    paper_bgcolor: "#0f1117",   // background outside the plot area
    plot_bgcolor:  "#0f1117",   // background inside the plot area
    font: {
      color:  "#e1e4ed",
      family: "-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    },
    margin: { l: 110, r: 30, t: 20, b: 50 },

    xaxis: {
      type:       "date",       // tells Plotly to treat x values as dates
      gridcolor:  "#2a2d3a",
      linecolor:  "#2a2d3a",
      tickformat: "%b '%y",     // compact format: "Mar '24" instead of "Mar 2024"
      dtick:      "M6",         // one tick every 6 months — less clutter
      tickangle:  0,            // keep labels horizontal for readability
      tickfont:   { size: 10 }, // slightly smaller tick font
    },

    yaxis: {
      // 5 rows now: Encounters, Labs, Diagnoses, Counseling, Medications
      tickvals:   [1, 2, 3, 4, 5],
      ticktext:   ["Encounters", "Labs", "Diagnoses", "Counseling", "Medications"],
      gridcolor:  "#1e2130",
      linecolor:  "#2a2d3a",
      fixedrange: true,         // disable vertical zoom/pan
      range:      [0.3, 5.7],   // small padding above/below the rows
    },

    // shapes[]: Draw additional shapes on the plot.
    // Here we draw a vertical dashed red line at today's date.
    // yref: "paper" means the y-coordinates are relative to the paper
    // (the whole chart area), not the data coordinates.
    shapes: [{
      type: 'line',
      x0: new Date().toISOString().slice(0, 10),
      x1: new Date().toISOString().slice(0, 10),
      y0: 0,
      y1: 1,
      yref: 'paper',
      line: { color: '#ff6b6b', width: 2, dash: 'dash' },
    }],

    // annotations[]: Add text labels to the chart.
    // This labels the "Today" line with the actual date.
    annotations: [{
      x: new Date().toISOString().slice(0, 10),
      y: 1.04,
      yref: 'paper',
      text: 'Today — ' + new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
      showarrow: false,
      font: { color: '#ff6b6b', size: 11 },
    }],

    showlegend: showLegend,
    legend: {
      orientation: "h",         // horizontal legend below the chart
      x: 0.5, xanchor: "center",
      y: -0.08,
      font: { size: 11 },
    },
    hovermode: "closest",
    dragmode:  "pan",           // default mouse drag = pan, not box-select
  };

  const config = {
    responsive:             true,    // chart resizes when the window resizes
    scrollZoom:             true,    // scroll wheel zooms the x-axis
    displayModeBar:         true,
    modeBarButtonsToRemove: ["lasso2d", "select2d"],
  };

  // Plotly.react() creates or updates the chart in the #timeline-chart div
  Plotly.react("timeline-chart", traces, layout, config);

  // Re-attach the click handler every time we re-render.
  // removeAllListeners prevents duplicate handlers stacking up over time.
  const chart = document.getElementById("timeline-chart");
  chart.removeAllListeners && chart.removeAllListeners("plotly_click");
  // When user clicks a marker, Plotly fires "plotly_click" event
  // data.points[0] is the first clicked point, .customdata is the full event object
  chart.on("plotly_click", data => {
    if (data.points.length > 0) showDetail(data.points[0].customdata);
  });
}


// =============================================================================
// buildSampleOrder(ev)
// =============================================================================
// Generates HTML for a sample clinical order based on the event category.
// Used only for planned (future) events to give clinicians a starting point.
//
// CLOSURE PATTERN WITH FACTORY FUNCTION:
//   const f = (label, value) => `<div>...</div>`
//   This creates a reusable function for generating field rows.
//   Cleaner than repeating the same HTML for every field.
//
// TERNARY OPERATOR: condition ? valueIfTrue : valueIfFalse
//   Concise way to choose between two values.
//
function buildSampleOrder(ev) {
  // CLOSURE: This function f() is defined inside buildSampleOrder,
  // so it can be called repeatedly to build the order fields.
  const f = (label, value) =>
    `<div class="order-field"><span class="order-field-label">${label}</span><span class="order-field-value">${value}</span></div>`;

  const dateStr = new Date(ev.event_date).toLocaleDateString("en-US", {
    year: "numeric", month: "long", day: "numeric"
  });

  // Common fields for every order
  let html = f("Patient", "T21 Patient — DOB 03/15/2024");
  html += f("Order Date", dateStr);
  html += f("Priority", "Routine");

  // Category-specific fields
  if (ev.category === "lab") {
    html += f("Order Type", "Laboratory");
    html += f("Test", ev.label);
    // TERNARY OPERATOR: choose specimen type based on test name
    html += f("Specimen", ev.label.includes("CBC") ? "Whole Blood (EDTA)" :
               ev.label.includes("Thyroid") ? "Serum" :
               ev.label.includes("Celiac") ? "Serum" :
               ev.label.includes("Cervical") ? "Imaging — X-ray" : "Serum");
    html += f("Diagnosis", ev.details.linked_diagnosis || "Trisomy 21 (Q90.0)");
    html += f("Clinical Indication", ev.description ? ev.description.split(".")[0] : "Routine screening per AAP guidelines");
    html += f("Fasting", ev.label.includes("Celiac") ? "Not required" : "Not required");
  } else if (ev.category === "encounter") {
    html += f("Order Type", "Referral / Appointment");
    html += f("Visit Type", ev.label);
    html += f("Provider", ev.details.provider || "TBD");
    html += f("Reason for Visit", ev.description ? ev.description.split(".")[0] : "Routine follow-up");
    html += f("Diagnosis", "Trisomy 21 (Q90.0)");
    if (ev.label.includes("Sleep")) {
      html += f("Study Type", "Attended polysomnography (CPT 95810)");
    }
  } else if (ev.category === "therapeutic") {
    const sub = ev.details.subtype || "therapeutic";
    if (sub === "medication") {
      html += f("Order Type", "Medication");
      html += f("Medication", ev.label);
      html += f("Dose", ev.details.dose || "Per current weight-based dosing");
      html += f("Frequency", ev.details.frequency || "See current regimen");
      html += f("Diagnosis", ev.details.linked_diagnosis || "Trisomy 21 (Q90.0)");
    } else {
      html += f("Order Type", "Counseling / Referral");
      html += f("Service", ev.label);
      html += f("Provider", ev.details.provider || "TBD");
      html += f("Reason", ev.description ? ev.description.split(".")[0] : "Routine per AAP guidelines");
      html += f("Diagnosis", "Trisomy 21 (Q90.0)");
    }
  }

  if (ev.details.guideline) {
    html += f("Guideline", ev.details.guideline);
  }

  return html;
}


// =============================================================================
// showDetail(ev)
// =============================================================================
// Populates and shows the right-hand detail popup for a clicked event.
//
// The popup content depends on the event's category:
//
//   ENCOUNTER  — shows event details, then lists all linked diagnoses and
//                labs so the clinician can see what happened at that visit.
//
//   DIAGNOSIS  — shows event details, plus a "Back-link" to its encounter.
//
//   LAB        — shows event details, plus back-links to its encounter
//                and its parent diagnosis.
//
// INTERNAL_FIELDS SET:
// Fields stored in details{} purely for cross-referencing (status, linked_encounter,
// linked_diagnosis, planned, guideline, subtype). These are shown in context below,
// so we hide them from the general metadata table to avoid duplication.
//
// The pattern is:
//   1. Build the general metadata table (ICD-10, provider, location, result, etc.)
//   2. Build linked items (diagnoses, labs, therapeutics from this encounter)
//   3. Build back-links (which encounter/diagnosis does this belong to)
//   4. Build planned-event UI if applicable (guideline ref, sample order button)
//   5. Assemble all sections into one HTML string
//   6. Inject it into #detail-content
//   7. Attach event listeners to interactive elements (sample order toggle)
//
function showDetail(ev) {
  const content = document.getElementById("detail-content");

  // INTERNAL_FIELDS SET: Fields we hide from the general metadata display
  // because they're shown contextually elsewhere (or are system fields).
  const INTERNAL_FIELDS = new Set([
    "status", "linked_encounter", "linked_diagnosis",
    "planned", "guideline", "subtype",
  ]);

  // Build the general metadata table (ICD-10, provider, location, result, etc.)
  let detailRows = "";
  for (const [k, v] of Object.entries(ev.details || {})) {
    if (v && !INTERNAL_FIELDS.has(k)) {
      // Convert snake_case key to Title Case: "icd10" -> "Icd10"
      const label = k.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      detailRows += `<tr><td>${label}</td><td>${v}</td></tr>`;
    }
  }

  const dateStr = new Date(ev.event_date).toLocaleDateString("en-US", {
    year: "numeric", month: "long", day: "numeric"
  });

  // -- ENCOUNTER: show linked diagnoses, labs, and therapeutics --------
  let linkedHtml = "";
  if (ev.category === "encounter") {
    const linked       = linkedToEncounter(ev.label);
    const diagnoses    = linked.filter(e => e.category === "diagnosis");
    const labs         = linked.filter(e => e.category === "lab");
    // Split therapeutics by subtype so they appear under separate headings
    const counselings  = linked.filter(e => e.category === "therapeutic" && e.details.subtype === "counseling");
    const medications  = linked.filter(e => e.category === "therapeutic" && e.details.subtype === "medication");

    // Helper: renders a group of linked items with a coloured dot + date
    const renderGroup = (items, color) => items.map(e => {
      const d = new Date(e.event_date).toLocaleDateString("en-US", {
        month: "short", day: "numeric", year: "numeric"
      });
      return `<div class="detail-linked-item">
        <span class="detail-linked-dot" style="background:${color}"></span>
        <span>${e.label}</span>
        <span style="margin-left:auto;font-size:0.75rem;opacity:0.5">${d}</span>
      </div>`;
    }).join("");

    if (linked.length) {
      linkedHtml =
        (diagnoses.length   ? `<div class="detail-section-title">Diagnoses Addressed</div>${renderGroup(diagnoses,   "#e74c3c")}` : "") +
        (labs.length        ? `<div class="detail-section-title">Labs Ordered</div>${renderGroup(labs,               "#2ecc71")}` : "") +
        (counselings.length ? `<div class="detail-section-title">Counseling</div>${renderGroup(counselings,          "#e67e22")}` : "") +
        (medications.length ? `<div class="detail-section-title">Medications</div>${renderGroup(medications,         "#9b59b6")}` : "");
    }
  }

  // -- DIAGNOSIS or LAB: show which encounter they belong to ----------
  let backLinkHtml = "";
  if (ev.details && ev.details.linked_encounter) {
    backLinkHtml += `
      <div class="detail-section-title">Encounter</div>
      <div class="detail-linked-item">
        <span class="detail-linked-dot" style="background:#3498db"></span>
        <span>${ev.details.linked_encounter}</span>
      </div>`;
  }

  // -- LAB: also show which diagnosis it relates to -------------------
  if (ev.details && ev.details.linked_diagnosis) {
    backLinkHtml += `
      <div class="detail-section-title">Related Diagnosis</div>
      <div class="detail-linked-item">
        <span class="detail-linked-dot" style="background:#e74c3c"></span>
        <span>${ev.details.linked_diagnosis}</span>
      </div>`;
  }

  // -- PLANNED: guideline reference and sample order button -----------
  const isPlanned = !!ev.planned;
  const plannedBadge = isPlanned
    ? `<span class="planned-badge">Planned</span>` : "";

  const guidelineRef = (isPlanned && ev.details && ev.details.guideline)
    ? `<div class="guideline-ref">${ev.details.guideline}</div>` : "";

  // Build a sample order with pre-filled fields appropriate to the category
  let orderBtnHtml = "";
  if (isPlanned) {
    const orderFields = buildSampleOrder(ev);
    orderBtnHtml = `
      <button class="sample-order-btn" id="sample-order-toggle">
        Sample Order
      </button>
      <div class="order-details" id="sample-order-panel">
        <h4>Sample Order — ${ev.label}</h4>
        ${orderFields}
      </div>`;
  }

  // Assemble the full popup HTML and inject it
  content.innerHTML = `
    <span class="cat-badge" style="background:${ev.color}">${ev.category}</span>
    ${plannedBadge}
    <h3>${ev.label}</h3>
    <div class="date">${dateStr}</div>
    ${guidelineRef}
    ${ev.description ? `<div class="desc">${ev.description}</div>` : ""}
    ${detailRows   ? `<table class="details-table">${detailRows}</table>` : ""}
    ${linkedHtml}
    ${backLinkHtml}
    ${orderBtnHtml}`;

  document.getElementById("detail-panel").style.display = "block";

  // Attach order toggle listener if this is a planned event
  // (EVENT LISTENER ATTACHMENT AFTER HTML INJECTION PATTERN)
  if (isPlanned) {
    const orderBtn   = document.getElementById("sample-order-toggle");
    const orderPanel = document.getElementById("sample-order-panel");
    if (orderBtn && orderPanel) {
      orderBtn.addEventListener("click", () => {
        const isOpen = orderPanel.classList.contains("open");
        orderPanel.classList.toggle("open");
        orderBtn.textContent = isOpen ? "Sample Order" : "Hide Order";
      });
    }
  }
}

// Close the popup when the X is clicked
document.getElementById("detail-close").addEventListener("click", () => {
  document.getElementById("detail-panel").style.display = "none";
});


// =============================================================================
// FILTER BUTTONS
// =============================================================================
// EVENT LISTENER ATTACHMENT PATTERN: querySelectorAll + forEach
//   document.querySelectorAll(".filter-btn") finds all buttons with class filter-btn
//   .forEach(btn => { ... }) runs the callback for each button
//
// Each button has data-cat attribute: "encounter", "diagnosis", "lab", "all", "planned"
//
// LOGIC:
//   "all"     — turn all categories on if anything is off, or off if all on
//   "planned" — toggle planned events (independent of category filters)
//   other     — toggle that single category, then sync "all" button state
//
// After any toggle, activeCategories and showPlanned are updated,
// then renderTimeline() is called to re-render the chart with new filters.
//
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const cat = btn.dataset.cat;

    // -- Planned toggle (independent of category filters) --
    if (cat === "planned") {
      showPlanned = !showPlanned;
      btn.classList.toggle("active");
      renderTimeline();
      return;
    }

    // All 5 filterable categories (therapeutic is now split into two)
    const ALL_CATS = ["diagnosis", "encounter", "lab", "counseling", "medication"];

    if (cat === "all") {
      // If all 5 are on, turn them all off; otherwise turn them all on
      const allOn = activeCategories.size === ALL_CATS.length;
      if (allOn) {
        activeCategories.clear();
        document.querySelectorAll(".filter-btn:not([data-cat='planned'])").forEach(b => b.classList.remove("active"));
      } else {
        activeCategories = new Set(ALL_CATS);
        document.querySelectorAll(".filter-btn:not([data-cat='planned'])").forEach(b => b.classList.add("active"));
      }
    } else {
      // Toggle the individual category on/off
      btn.classList.toggle("active");
      activeCategories.has(cat) ? activeCategories.delete(cat) : activeCategories.add(cat);

      // Keep the "All" button in sync
      const allBtn = document.querySelector('.filter-btn[data-cat="all"]');
      activeCategories.size === ALL_CATS.length
        ? allBtn.classList.add("active")
        : allBtn.classList.remove("active");
    }

    renderTimeline();
  });
});


// =============================================================================
// LEGEND TOGGLE
// =============================================================================
// The Legend button toggles showLegend and re-renders the chart.
// Plotly's showlegend layout property controls visibility.
document.getElementById("legend-toggle").addEventListener("click", () => {
  showLegend = !showLegend;
  document.getElementById("legend-toggle").classList.toggle("active");
  renderTimeline();
});


// =============================================================================
// INITIALISATION
// =============================================================================
// These two functions are called as soon as the page loads, kickstarting
// the entire application.
//
// renderProblemList() fills the left-side panel with all problems.
// renderTimeline()    draws the Plotly chart with Encounters visible by default.
//
// From this point on, the app is interactive: users can click buttons,
// which triggers filter logic, which calls renderTimeline() again.
//
renderProblemList();
renderTimeline();
</script>
</body>
</html>
